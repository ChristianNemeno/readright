services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    environment:
      PHILIRI_WHISPER_MODEL: base
      PHILIRI_DEVICE: cpu
      PHILIRI_MODEL_CACHE_DIR: /model_cache
      PHILIRI_CORS_ORIGINS: https://readright.nenome.online
    volumes:
      - model_cache:/model_cache
    restart: unless-stopped
    networks:
      default:
      caddy_net:
        aliases:
          - readright-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: https://readright.nenome.online
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      default:
      caddy_net:
        aliases:
          - readright-frontend

networks:
  default:
  caddy_net:
    external: true

volumes:
  model_cache:
